name: "🐛 Bug Report"
description: "Something in a recipe is broken or behaving unexpectedly."
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        Please be as specific as possible so we can reproduce and fix quickly.

  - type: dropdown
    id: recipe
    attributes:
      label: "Affected Recipe"
      description: "Which recipe is this bug in?"
      options:
        - lead-qualification
        - faq-bot
        - appointment-booking
        - whatsapp-action-sim
        - docs / README
        - other / repo-wide
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Bug Description"
      description: "A clear and concise description of what the bug is."
      placeholder: "When I run run.py with X inputs, I get Y error instead of Z output."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      description: "How can we reproduce the issue?"
      value: |
        1. cd recipes/<recipe-name>
        2. pip install -r requirements.txt
        3. python run.py --...
        4. See error:
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected Behaviour"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual Behaviour / Full Error"
      render: shell
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: "Python Version"
      placeholder: "e.g. 3.12.0"
    validations:
      required: true

  - type: input
    id: crewai-version
    attributes:
      label: "CrewAI Version"
      placeholder: "e.g. 1.15.2"
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: "Before Submitting"
      options:
        - label: "I searched existing issues and this is not a duplicate."
          required: true
        - label: "I confirmed NVIDIA_API_KEY is set and valid."
          required: false
