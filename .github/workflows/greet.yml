name: Greet First-Time Contributors
on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Welcome to `crewai-recipes`! 👋 We're so glad you've opened your first issue.
            
            If you're looking to contribute, please check out our [CONTRIBUTING.md](https://github.com/Karan-Raj-KR/crewai-recipes/blob/main/CONTRIBUTING.md) guide.
            To get started with code, take a look at our issues labeled [`good first issue`](https://github.com/Karan-Raj-KR/crewai-recipes/labels/good%20first%20issue).
            
            A maintainer will review your issue shortly.
          pr-message: |
            Welcome to `crewai-recipes`! 🎉 Thank you for your first pull request!
            
            Please make sure you've read our [CONTRIBUTING.md](https://github.com/Karan-Raj-KR/crewai-recipes/blob/main/CONTRIBUTING.md) and that your code follows our guidelines.
            A maintainer will review your pull request as soon as possible.
