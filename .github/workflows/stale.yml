name: Mark stale issues and pull requests
on:
  schedule:
    - cron: '0 0 * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 45
          days-before-close: -1
          stale-issue-message: 'This issue has been inactive for 45 days. Please comment if you are still working on it or it will be marked as stale.'
          stale-pr-message: 'This PR has been inactive for 45 days. Please update it or it will be marked as stale.'
          exempt-issue-labels: 'level: advanced'
          exempt-pr-labels: 'level: advanced'
          exempt-all-assignees: true
