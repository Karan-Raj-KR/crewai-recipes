name: CI — Lint & Import Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff check
        run: ruff check recipes/lead-qualification/ recipes/faq-bot/

      - name: Run Ruff format check
        run: ruff format --check recipes/lead-qualification/ recipes/faq-bot/

  import-check-lead-qualification:
    name: Import Check — lead-qualification
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r recipes/lead-qualification/requirements.txt

      - name: Check imports (no API call)
        run: |
          cd recipes/lead-qualification
          # Set a dummy key so the module-level EnvironmentError isn't triggered on import
          NVIDIA_API_KEY=nvapi-test python -c "
          import sys, os
          os.environ['NVIDIA_API_KEY'] = 'nvapi-test'
          # Only check that modules import and functions exist — no real LLM calls
          from tasks import build_tasks
          from crew import build_crew
          print('✅ lead-qualification imports OK')
          "

  import-check-faq-bot:
    name: Import Check — faq-bot
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r recipes/faq-bot/requirements.txt

      - name: Check imports (no API call)
        run: |
          cd recipes/faq-bot
          NVIDIA_API_KEY=nvapi-test python -c "
          import os
          os.environ['NVIDIA_API_KEY'] = 'nvapi-test'
          from knowledge_base import FAQ_KNOWLEDGE_BASE, get_knowledge_base_text
          assert len(FAQ_KNOWLEDGE_BASE) >= 6, 'Expected at least 6 FAQ entries'
          kb_text = get_knowledge_base_text()
          assert 'PRICING' in kb_text, 'Expected PRICING topic in KB text'
          print(f'✅ faq-bot: {len(FAQ_KNOWLEDGE_BASE)} KB entries verified')
          "
