name: CI — Lint & Test Recipes

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff check
        run: ruff check recipes/

      - name: Run Ruff format check
        run: ruff format --check recipes/

  test-lead-qualification:
    name: Smoke Test — lead-qualification
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r recipes/lead-qualification/requirements.txt

      - name: Run import checks
        run: |
          cd recipes/lead-qualification
          python -c "from agents import build_agents; from tasks import build_tasks; from crew import build_crew; print('✅ lead-qualification imports OK')"

  test-appointment-booking:
    name: Smoke Test — appointment-booking
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r recipes/appointment-booking/requirements.txt

      - name: Run import checks
        run: |
          cd recipes/appointment-booking
          python -c "from agents import build_agents; from tasks import build_tasks; from crew import build_crew; print('✅ appointment-booking imports OK')"

  test-faq-bot:
    name: Smoke Test — faq-bot
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r recipes/faq-bot/requirements.txt

      - name: Run import checks
        run: |
          cd recipes/faq-bot
          python -c "from agents import build_agents; from tasks import build_tasks; from crew import build_crew; print('✅ faq-bot imports OK')"
