name: CI — Lint & Import Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so pushes don't pile up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # CrewAI requires Python >=3.10,<3.14. Pin to 3.12 for CI.
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      # Lint only the stable recipes. The scaffolds intentionally contain
      # TODO stubs (unused imports/vars) and are excluded until implemented.
      - name: Run Ruff check
        run: ruff check recipes/lead-qualification/ recipes/faq-bot/

      - name: Run Ruff format check
        run: ruff format --check recipes/lead-qualification/ recipes/faq-bot/

  import-check-lead-qualification:
    name: Import Check — lead-qualification
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install this recipe's dependencies
        run: pip install -r recipes/lead-qualification/requirements.txt

      - name: Check imports + LLM wiring (no API call)
        env:
          # Dummy key so the module-level EnvironmentError isn't triggered.
          # Constructing the LLM does NOT hit the network — no real call is made.
          LLM_API_KEY: nvapi-test
        run: |
          cd recipes/lead-qualification
          python -c "
          from tasks import build_tasks
          from crew import build_crew
          from llm import get_llm
          llm = get_llm()                       # validates ResilientLLM builds
          assert type(llm).__name__ == 'ResilientLLM', 'expected retry-wrapped LLM'
          assert 'llama-3.1-8b-instruct' in llm.model, f'unexpected default model: {llm.model}'
          print('✅ lead-qualification: imports + resilient LLM wiring OK')
          "

  import-check-faq-bot:
    name: Import Check — faq-bot
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install this recipe's dependencies
        run: pip install -r recipes/faq-bot/requirements.txt

      - name: Check knowledge base + LLM wiring (no API call)
        env:
          LLM_API_KEY: nvapi-test
        run: |
          cd recipes/faq-bot
          python -c "
          from knowledge_base import FAQ_KNOWLEDGE_BASE, get_knowledge_base_text
          from llm import get_llm
          assert len(FAQ_KNOWLEDGE_BASE) >= 6, 'Expected at least 6 FAQ entries'
          kb_text = get_knowledge_base_text()
          assert 'PRICING' in kb_text, 'Expected PRICING topic in KB text'
          llm = get_llm()                       # validates ResilientLLM builds
          assert type(llm).__name__ == 'ResilientLLM', 'expected retry-wrapped LLM'
          print(f'✅ faq-bot: {len(FAQ_KNOWLEDGE_BASE)} KB entries + resilient LLM wiring OK')
          "

  import-check-playground:
    name: Import Check — playground
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install playground dependencies
        run: pip install -r playground/requirements.txt

      - name: Verify FastAPI app imports and starts
        env:
          # Dummy key so env validation doesn't fail
          LLM_API_KEY: test-key
        run: |
          cd playground
          # Use python to import main and instantiate the app
          python -c "
          from main import app
          assert app.title == 'CrewAI Recipes Playground'
          print('✅ playground: FastAPI app imports and initializes OK')
          "
