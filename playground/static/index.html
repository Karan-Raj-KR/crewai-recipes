<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrewAI Recipes Playground</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --error: #ef4444;
            --border: #334155;
            --font-main: system-ui, -apple-system, sans-serif;
            --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 2rem;
            box-sizing: border-box;
        }

        header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        .card {
            background-color: var(--surface-color);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
        }

        select, input, textarea {
            width: 100%;
            padding: 0.75rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background-color: var(--bg-color);
            color: var(--text-color);
            box-sizing: border-box;
            font-family: inherit;
        }

        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: background-color 0.2s;
        }

        button:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .result-panel {
            background-color: #000;
            padding: 1.5rem;
            border-radius: 8px;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            white-space: pre-wrap;
            overflow-x: auto;
            min-height: 100px;
            border: 1px solid var(--border);
            line-height: 1.5;
        }

        .error {
            color: var(--error);
            margin-top: 1rem;
            font-size: 0.9rem;
            padding: 1rem;
            background-color: rgba(239, 68, 68, 0.1);
            border-left: 4px solid var(--error);
            display: none;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🤖 CrewAI Recipes Playground</h1>
        <p class="subtitle">Run recipes locally. Your API key never leaves your machine.</p>
    </header>

    <div class="card">
        <div class="form-group">
            <label for="recipe-select">Select a Recipe</label>
            <select id="recipe-select">
                <option value="">Loading recipes...</option>
            </select>
            <p id="recipe-desc" class="subtitle"></p>
        </div>

        <div id="dynamic-inputs"></div>

        <div class="form-group" style="margin-top: 1.5rem; margin-bottom: 0;">
            <button id="run-btn" disabled>Run Recipe</button>
        </div>
        
        <div id="error-msg" class="error"></div>
    </div>

    <div class="card" style="margin-top: 2rem;">
        <label>Final Output</label>
        <div id="result" class="result-panel">Ready. Select a recipe and click Run.</div>
    </div>
</div>

<script>
    let recipesData = [];

    const select = document.getElementById('recipe-select');
    const desc = document.getElementById('recipe-desc');
    const inputsContainer = document.getElementById('dynamic-inputs');
    const runBtn = document.getElementById('run-btn');
    const resultPanel = document.getElementById('result');
    const errorMsg = document.getElementById('error-msg');

    async function loadRecipes() {
        try {
            const res = await fetch('/recipes');
            const data = await res.json();
            recipesData = data.recipes;
            
            select.innerHTML = '<option value="">-- Choose a Recipe --</option>';
            recipesData.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r.id;
                opt.textContent = r.id;
                select.appendChild(opt);
            });
        } catch (e) {
            showError("Failed to load recipes. Is the backend running?");
        }
    }

    select.addEventListener('change', (e) => {
        const recipeId = e.target.value;
        const recipe = recipesData.find(r => r.id === recipeId);
        
        inputsContainer.innerHTML = '';
        errorMsg.style.display = 'none';
        
        if (!recipe) {
            desc.textContent = '';
            runBtn.disabled = true;
            return;
        }

        desc.textContent = recipe.description;
        runBtn.disabled = false;

        recipe.inputs.forEach(input => {
            const div = document.createElement('div');
            div.className = 'form-group';
            
            const label = document.createElement('label');
            label.textContent = input.label;
            
            let field;
            if (input.name === 'description' || input.name === 'customer_details' || input.name === 'message') {
                field = document.createElement('textarea');
                field.rows = 4;
            } else {
                field = document.createElement('input');
                field.type = 'text';
            }
            
            field.id = `input-${input.name}`;
            field.dataset.name = input.name;
            field.placeholder = `Enter ${input.label.toLowerCase()}`;
            
            div.appendChild(label);
            div.appendChild(field);
            inputsContainer.appendChild(div);
        });
    });

    runBtn.addEventListener('click', async () => {
        const recipeId = select.value;
        if (!recipeId) return;

        const inputs = {};
        let missing = false;
        inputsContainer.querySelectorAll('input, textarea').forEach(el => {
            if (!el.value.trim()) missing = true;
            inputs[el.dataset.name] = el.value.trim();
        });

        if (missing) {
            showError("Please fill in all fields.");
            return;
        }

        errorMsg.style.display = 'none';
        resultPanel.innerHTML = '<span class="loader"></span> Running agents... (this may take a minute)';
        runBtn.disabled = true;

        try {
            const res = await fetch('/run', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ recipe: recipeId, inputs })
            });

            const data = await res.json();
            
            if (!res.ok) {
                showError(data.detail || "An error occurred.");
                resultPanel.textContent = "Failed.";
            } else {
                resultPanel.textContent = data.output;
            }
        } catch (e) {
            showError("Network error. Is the backend running?");
            resultPanel.textContent = "Failed.";
        } finally {
            runBtn.disabled = false;
        }
    });

    function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.style.display = 'block';
    }

    loadRecipes();
</script>

</body>
</html>
